<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
      
      <h3 class="text-center mb-4">Iniciar Sesión</h3>
  
      <form>
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            name="email"
            [(ngModel)]="loginReq.email"
            placeholder="ejemplo@email.com"
            required>
        </div>
  
        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input 
            type="password" 
            class="form-control" 
            id="password" 
            name="password"
            [(ngModel)]="loginReq.password"
            placeholder="••••••••"
            required>
        </div>
  
        <!-- Botón -->
        <div class="d-grid">
          <button type="submit" (click)="iniciarSesion()" class="btn btn-primary">
            Ingresar
          </button>
        </div>
      </form>
  
    </div>
  </div>
