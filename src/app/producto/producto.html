<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Productos</h3>

    <button class="btn btn-outline-danger" (click)="cerrarSesion()">
      Cerrar sesión
    </button>
  </div>

  <div class="mt-3">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div></div>

      <button class="btn btn-primary" (click)="abrirModalCrear()">
        Nuevo Producto
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped table-hover">

        <thead class="table">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Activo</th>
            <th>Fecha Creación</th>
            <th style="width:120px">Acciones</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let producto of listaProductos">

            <td>{{producto.id}}</td>

            <td>{{producto.nombre}}</td>

            <td>
              {{producto.precio | currency:'USD'}}
            </td>

            <td>{{producto.stock}}</td>

            <td>
              <span class="badge" [ngClass]="producto.activo ? 'bg-success' : 'bg-secondary'">

                {{producto.activo ? 'Activo' : 'Inactivo'}}

              </span>
            </td>

            <td>
              {{producto.fechaCreacion | date:'yyyy-MM-dd'}}
            </td>

            <td>

              <div class="d-flex justify-content-center gap-3">

                <button class="btn btn-warning btn-sm" (click)="abrirModalEditar(producto)">
                  Editar
                </button>

                <button class="btn btn-danger btn-sm" (click)="eliminarProducto(producto)">
                  Eliminar
                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>
    </div>

  </div>

</div>
